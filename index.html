<body>
    <div class="paper-texture"></div>

    <!-- Socials Top Right -->

        <a href="https://x.com/homoonsolanas" target="_blank" class="social-btn">
            <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">

    <div class="floating-balls" id="floating-balls-container"></div>

        <section class="logo-section">
            <img src="./homo.png" alt="Arthur Rainbow Fist" id="main-logo" onerror="this.src='https://via.placeholder.com/800x800/ffcc00/ffffff?text=Save+image+as+homo.png'">
        </section>

        <!-- Information / Links -->
        <section class="info-section">
            <div class="retro-box ca-box">
                <span class="ca-label">CA:</span>
                <code id="ca-text">HziPQunVCQN6Knjxv96pEjqLxpJsZ7KFvHGV7TVEpump</code>
                <button id="copy-btn" title="Copy to clipboard">COPY</button>
            </div>

        <!-- Dexscreener Chart -->
        <section class="chart-section">
            <div class="retro-box chart-container">
                <h2 class="chart-title rainbow-text">LIVE CHART</h2>
